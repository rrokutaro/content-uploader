name: Uploader Server

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MONGODB_URI:              ${{ secrets.MONGODB_URI }}
      GDRIVE_SERVER_CONFIGS_ID: ${{ secrets.GDRIVE_SERVER_CONFIGS_ID }}
      GDRIVE_CLIENT_SECRETS_ID: ${{ secrets.GDRIVE_CLIENT_SECRETS_ID }}
      GDRIVE_CLIENT_TOKENS_ID:  ${{ secrets.GDRIVE_CLIENT_TOKENS_ID }}
      UPLOADER_CONFIGS:         ${{ secrets.UPLOADER_CONFIGS }}
      UPLOADER_MIN_GAP:         ${{ secrets.UPLOADER_MIN_GAP }}
      UPLOADER_WINDOW:          ${{ secrets.UPLOADER_WINDOW }}
      UPLOADER_DRY_RUN:         ${{ secrets.UPLOADER_DRY_RUN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip unzip
          pip3 install --upgrade "yt-dlp[default]" gdown --break-system-packages

      - name: Install npm deps
        run: npm install

      - name: Verify US location
        continue-on-error: true
        run: |
          LOCATION=$(curl -sf --max-time 10 \
            -H "Accept: application/json" \
            -H "User-Agent: curl/7.88.1" \
            https://ipinfo.io/json) \
          || LOCATION=$(curl -sf --max-time 10 https://ipapi.co/json/) \
          || LOCATION=$(curl -sf --max-time 10 https://ip-api.com/json/)
      
          if [ -z "$LOCATION" ]; then
            echo "⚠️ Could not fetch location from any provider — assuming US (GitHub Actions)"
            exit 0
          fi
      
          IP=$(echo "$LOCATION"      | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ip', d.get('query','unknown')))" 2>/dev/null || echo "unknown")
          CITY=$(echo "$LOCATION"    | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('city','unknown'))" 2>/dev/null || echo "unknown")
          REGION=$(echo "$LOCATION"  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('region','unknown'))" 2>/dev/null || echo "unknown")
          COUNTRY=$(echo "$LOCATION" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('country','unknown'))" 2>/dev/null || echo "unknown")
          ORG=$(echo "$LOCATION"     | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('org', d.get('isp','unknown')))" 2>/dev/null || echo "unknown")
      
          echo "🌍 IP:      $IP"
          echo "🏙️  City:    $CITY, $REGION"
          echo "🇺🇸 Country: $COUNTRY"
          echo "🏢 Org:     $ORG"
      
          if [ "$COUNTRY" != "US" ]; then
            echo "❌ Non-US runner detected!"
            exit 1
          fi
      
          echo "✅ Runner confirmed US-based"
          
      - name: Run uploader
        run: |
          node uploader-server.js \
            --configs "$UPLOADER_CONFIGS" \
            --min-gap "$UPLOADER_MIN_GAP" \
            --window "$UPLOADER_WINDOW" \
            --log-file stdout
